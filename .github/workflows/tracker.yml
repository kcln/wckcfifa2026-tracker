name: wc2026-tracker
on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min (UTC, best-effort); tournament window Jun 11 - Jul 19 2026
  workflow_dispatch: {}
permissions:
  contents: write
  actions: write            # lets a capped live run dispatch its continuation
concurrency:
  group: tracker
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # live loop self-caps at 5h20m, well inside this
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - name: Configure git identity
        run: |
          git config user.name "wc2026-tracker"
          git config user.email "actions@users.noreply.github.com"
      - name: Run tracker (live mode)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          GIT_AUTOCOMMIT: "1"   # commit+push after each live cycle so sent-state survives hard kills
        run: python -m src.tracker --live
      - name: Commit and push results
        if: always()
        run: |
          git add state.json subscribers.json docs/
          git diff --cached --quiet || git commit -m "update: tracker run $(date -u +%FT%TZ)"
          # Telegram messages were already sent in the run step; this push is
          # what persists the sent-state that dedupes them. A lost push means
          # the next run sees the message as unsent and delivers it AGAIN —
          # that caused duplicate match-day briefs on 2026-06-17 when a push
          # raced a concurrent one and the run failed after sending. Always run
          # the retry loop (not just on a fresh commit) because an in-loop
          # git_sync may have committed locally but failed to push, leaving an
          # unpushed commit a staged-only check would miss. pull --rebase + push
          # is a no-op when already in sync, so this is safe to always run.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --no-edit && git push; then
              echo "persisted on attempt $attempt"; exit 0
            fi
            echo "push attempt $attempt failed; resetting and retrying"
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 3))
          done
          echo "ERROR: could not persist sent-state after 5 attempts"; exit 1
      - name: Chain continuation run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f .season-ended ]; then
            echo "Tournament over - not chaining."
          elif [ -f .live-continue ]; then
            echo "Live window still open at runtime cap - dispatching continuation"
            gh workflow run tracker.yml --ref main
          fi
      - name: Stop scheduled runs after the tournament
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f .season-ended ]; then
            echo "Tournament over - disabling the scheduled workflow."
            gh workflow disable tracker.yml --repo "${{ github.repository }}" || true
          fi

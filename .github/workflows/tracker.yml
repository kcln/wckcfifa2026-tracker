name: wc2026-tracker
on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min (UTC, best-effort); tournament window Jun 11 - Jul 19 2026
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: tracker
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python -m src.tracker
      - name: Commit and push results
        run: |
          git config user.name "wc2026-tracker"
          git config user.email "actions@users.noreply.github.com"
          git add state.json docs/
          git diff --cached --quiet || git commit -m "update: tracker run $(date -u +%FT%TZ)"
          git push
